---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - sync.lumos.io
  resources:
  - clusterconfigstores
  - configstores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sync.lumos.io
  resources:
  - encryptedsecrets
  - externalconfigs
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sync.lumos.io
  resources:
  - encryptedsecrets/status
  - externalconfigs/status
  verbs:
  - get
  - patch
  - update
