---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: encryptedsecrets.sync.lumos.io
spec:
  group: sync.lumos.io
  names:
    kind: EncryptedSecret
    listKind: EncryptedSecretList
    plural: encryptedsecrets
    singular: encryptedsecret
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.storeRef.name
      name: Store
      type: string
    - jsonPath: .spec.target.name
      name: Target
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.syncedAt
      name: Synced At
      type: date
    - jsonPath: .status.observedVersion
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EncryptedSecret syncs SOPS-encrypted files from a Git repository and writes
          the decrypted key-value pairs into a Kubernetes Secret.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EncryptedSecretSpec defines the desired state of EncryptedSecret.
            properties:
              ageKeyRef:
                description: |-
                  AgeKeyRef is the name of the K8s Secret in the same namespace that contains
                  the age private key under the "keys.txt" data key (AGE-SECRET-KEY-...).
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              data:
                description: |-
                  Data lists the SOPS-encrypted files to read from the Git store.
                  Each file is decrypted and its top-level keys are written into the target Secret.
                items:
                  description: EncryptedSecretData references a single SOPS-encrypted
                    file in the Git repository.
                  properties:
                    source:
                      description: |-
                        Source is the file path in the Git repository (e.g. "secrets/app.yaml").
                        The file must be SOPS-encrypted with the age key referenced by AgeKeyRef.
                      type: string
                  required:
                  - source
                  type: object
                maxItems: 20
                minItems: 1
                type: array
              refreshInterval:
                default: 5m
                description: RefreshInterval defines how often to re-sync from the
                  Git store.
                type: string
              storeRef:
                description: StoreRef points to the ConfigStore (Git provider) that
                  holds the encrypted files.
                properties:
                  kind:
                    default: ConfigStore
                    description: |-
                      kind of the store. Either ConfigStore or ClusterConfigStore.
                      Defaults to ConfigStore.
                    enum:
                    - ConfigStore
                    - ClusterConfigStore
                    type: string
                  name:
                    description: name of the ConfigStore or ClusterConfigStore.
                    type: string
                required:
                - name
                type: object
              target:
                description: Target defines the output K8s Secret. Defaults to the
                  EncryptedSecret name.
                properties:
                  name:
                    description: Name of the K8s Secret to create. Defaults to the
                      EncryptedSecret name.
                    type: string
                type: object
            required:
            - ageKeyRef
            - data
            - storeRef
            type: object
          status:
            description: EncryptedSecretStatus defines the observed state of EncryptedSecret.
            properties:
              conditions:
                description: Conditions reflect the current state. The "Ready" condition
                  tracks sync health.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedVersion:
                description: ObservedVersion is the Git commit SHA of the last successful
                  sync.
                type: string
              syncedAt:
                description: SyncedAt is the timestamp of the last successful sync.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
